<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="AWSMindset">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="word" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <g transform="translate(8 12)">
    <rect width="56" height="56" rx="13" fill="url(#bg)"/>
    <path d="M16 38 Q11 38 11 32 Q11 27 16 27 Q17 19 27 19 Q36 19 37 27 Q42 27 42 32 Q42 38 37 38 Z"
          fill="#ffffff"/>
    <circle cx="43" cy="45" r="6" fill="#ff9900" stroke="#060a14" stroke-width="2"/>
  </g>

  <!-- Wordmark — "AWS" in white + "Mindset" gradient -->
  <text x="80" y="52"
        font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif"
        font-weight="800"
        font-size="32"
        letter-spacing="-0.5"
        fill="#ffffff">AWS</text>
  <text x="146" y="52"
        font-family="Inter, ui-sans-serif, system-ui, Arial, sans-serif"
        font-weight="800"
        font-size="32"
        letter-spacing="-0.5"
        fill="url(#word)">Mindset</text>
</svg>
